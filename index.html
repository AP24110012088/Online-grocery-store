<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAILY BASKET – Fresh Groceries Online</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <div class="logo-icon">🛒</div>
      <span class="logo-text">DAILY <span>BASKET</span></span>
    </a>
    <div class="nav-right">
      <span class="nav-tagline">Fresh. Fast. Delivered.</span>
      <a href="/cart-page" class="cart-btn">
        <i class="fa-solid fa-basket-shopping"></i>
        Cart
        <span class="cart-count" id="cart-count">0</span>
      </a>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <div class="hero-content">
      <div class="hero-badge">
        <i class="fa-solid fa-leaf"></i> 100% Fresh &amp; Organic
      </div>
      <h1>Your Daily Groceries,<br>Delivered Fresh 🌿</h1>
      <p>Shop from hundreds of fresh fruits, vegetables, dairy, and more — right to your doorstep.</p>
    </div>
  </section>

  <!-- ===== CATEGORIES ===== -->
  <div class="section-header">
    <div class="section-title">Shop by Category</div>
    <div class="category-filters" id="category-filters">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- ===== PRODUCTS ===== -->
  <section class="products-section">
    <div class="products-grid" id="products-grid">
      <!-- Rendered by JS (skeletons then products) -->
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>© 2024 <strong>DAILY BASKET</strong> · Fresh groceries delivered to your door · Built with ❤️</p>
  </footer>

  <!-- ===== TOAST CONTAINER ===== -->
  <div class="toast-container" id="toast-container"></div>

  <script src="main.js"></script>
</body>
</html>
